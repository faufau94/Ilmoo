version: "3.8"

services:
  # ── API Backend (Fastify + Socket.io) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ilmoo-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://ilmoo:${DB_PASSWORD}@postgres:5432/ilmoo
      REDIS_URL: redis://redis:6379
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ilmoo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Admin Backoffice (Vue 3 + Vite) ──
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: ilmoo-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api
    networks:
      - ilmoo-network

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: ilmoo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ilmoo
      POSTGRES_USER: ilmoo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - ilmoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilmoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: ilmoo-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ilmoo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  ilmoo-network:
    driver: bridge