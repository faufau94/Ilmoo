services:
  # ── API Backend (Fastify + Socket.io) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ilmoo-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://ilmoo:${DB_PASSWORD}@postgres:5432/ilmoo
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ilmoo-network

  # ── Admin Backoffice (Vue 3 + Nginx) ──
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: ilmoo-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ilmoo-network

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: ilmoo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ilmoo
      POSTGRES_USER: ilmoo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilmoo -d ilmoo"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ilmoo-network

  # ── Database seed (one-shot, runs then exits) ──
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.seed
    container_name: ilmoo-seed
    restart: "no"
    environment:
      DATABASE_URL: postgresql://ilmoo:${DB_PASSWORD}@postgres:5432/ilmoo
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ilmoo-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: ilmoo-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ilmoo-network

volumes:
  postgres_data:
  redis_data:

networks:
  ilmoo-network:
    driver: bridge
